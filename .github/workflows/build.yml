name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-SDL3

      - name: Configure
        run: cmake -B build -G "MinGW Makefiles"

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p dist
          cp build/spcplayer.exe dist/
          cp "$(pkg-config --variable=libdir sdl3)/../bin/SDL3.dll" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: spcplayer-windows-x64
          path: dist/
